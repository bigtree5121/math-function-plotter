<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>解析器测试 - 验证 -x^2</title>
    <style>
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        h1 {
            color: #4a5568;
            text-align: center;
            margin-bottom: 30px;
        }
        .test-case {
            margin-bottom: 20px;
            padding: 15px;
            background: #f7fafc;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }
        .input {
            font-family: 'Courier New', monospace;
            font-size: 16px;
            color: #2d3748;
            margin-bottom: 10px;
        }
        .result {
            font-family: 'Courier New', monospace;
            font-size: 14px;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
        }
        .success {
            background: #c6f6d5;
            color: #22543d;
        }
        .error {
            background: #fed7d7;
            color: #742a2a;
        }
        .test-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin: 10px 0;
            transition: background 0.3s;
        }
        .test-btn:hover {
            background: #5a67d8;
        }
        .output-area {
            margin-top: 20px;
            padding: 15px;
            background: #2d3748;
            color: #e2e8f0;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            min-height: 100px;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 解析器测试 - 验证 -x^2</h1>
        
        <div class="test-case">
            <div class="input"><strong>测试表达式：</strong> -x^2</div>
            <button class="test-btn" onclick="testExpression('-x^2')">运行测试</button>
            <div class="result" id="result1"></div>
        </div>

        <div class="test-case">
            <div class="input"><strong>测试表达式：</strong> x^2</div>
            <button class="test-btn" onclick="testExpression('x^2')">运行测试</button>
            <div class="result" id="result2"></div>
        </div>

        <div class="test-case">
            <div class="input"><strong>测试表达式：</strong> -2*x + 3</div>
            <button class="test-btn" onclick="testExpression('-2*x + 3')">运行测试</button>
            <div class="result" id="result3"></div>
        </div>

        <div class="test-case">
            <div class="input"><strong>测试表达式：</strong> -x^2 + 4*x - 3</div>
            <button class="test-btn" onclick="testExpression('-x^2 + 4*x - 3')">运行测试</button>
            <div class="result" id="result4"></div>
        </div>

        <div class="output-area" id="output">点击按钮开始测试...</div>
    </div>

    <script>
class MathParser {
    constructor() {
        this.position = 0;
        this.expression = '';
        this.tokens = [];
    }
    parse(expression) {
        this.expression = expression.replace(/\s+/g, '');
        this.position = 0;
        this.tokens = this.tokenize();
        if (this.tokens.length === 0) throw new Error('表达式为空');
        const ast = this.parseExpression();
        return (x) => this.evaluate(ast, x);
    }
    tokenize() {
        const tokens = [];
        const regex = /(\d*\.?\d+)|([a-zA-Z]+)|([+\-*/^()])|(\|)/g;
        let match;
        while ((match = regex.exec(this.expression)) !== null) {
            const token = match[0];
            if (/\d/.test(token)) tokens.push({ type: 'NUMBER', value: parseFloat(token) });
            else if (/[a-zA-Z]/.test(token)) {
                if (token === 'x') tokens.push({ type: 'VARIABLE', value: token });
                else tokens.push({ type: 'FUNCTION', value: token });
            } else if (['+', '-', '*', '/', '^'].includes(token)) tokens.push({ type: 'OPERATOR', value: token });
            else if (token === '(') tokens.push({ type: 'LPAREN' });
            else if (token === ')') tokens.push({ type: 'RPAREN' });
            else if (token === '|') tokens.push({ type: 'ABS' });
        }
        return tokens;
    }
    parseExpression() { return this.parseAddSubtract(); }
    parseAddSubtract() {
        let left = this.parseMultiplyDivide();
        while (this.position < this.tokens.length) {
            const token = this.tokens[this.position];
            if (token && token.type === 'OPERATOR' && (token.value === '+' || token.value === '-')) {
                this.position++;
                const right = this.parseMultiplyDivide();
                left = { type: 'BINARY_OP', operator: token.value, left, right };
            } else break;
        }
        return left;
    }
    parseMultiplyDivide() {
        let left = this.parseUnary();
        while (this.position < this.tokens.length) {
            const token = this.tokens[this.position];
            if (token && token.type === 'OPERATOR' && (token.value === '*' || token.value === '/')) {
                this.position++;
                const right = this.parseUnary();
                left = { type: 'BINARY_OP', operator: token.value, left, right };
            } else break;
        }
        return left;
    }
    parsePower() {
        let left = this.parseFactor();
        while (this.position < this.tokens.length) {
            const token = this.tokens[this.position];
            if (token && token.type === 'OPERATOR' && token.value === '^') {
                this.position++;
                const right = this.parseUnary();
                left = { type: 'BINARY_OP', operator: '^', left, right };
            } else break;
        }
        return left;
    }
    parseUnary() {
        const token = this.tokens[this.position];
        if (token && token.type === 'OPERATOR' && (token.value === '+' || token.value === '-')) {
            this.position++;
            return { type: 'UNARY_OP', operator: token.value, operand: this.parsePower() };
        }
        return this.parsePowerPrimary();
    }
    parsePowerPrimary() {
        return this.parseFactor();
    }
    parseFactor() {
        const token = this.tokens[this.position];
        if (!token) throw new Error('意外的表达式结束');
        switch (token.type) {
            case 'NUMBER': this.position++; return { type: 'NUMBER', value: token.value };
            case 'VARIABLE': this.position++; return { type: 'VARIABLE', name: token.value };
            case 'FUNCTION': return this.parseFunction();
            case 'LPAREN': {
                this.position++;
                const expr = this.parseExpression();
                if (!this.tokens[this.position] || this.tokens[this.position].type !== 'RPAREN') throw new Error('缺少右括号');
                this.position++;
                return expr;
            }
            case 'ABS': return this.parseAbsolute();
            default: throw new Error(`意外的token: ${token.value || token.type}`);
        }
    }
    parseFunction() {
        const functionToken = this.tokens[this.position];
        this.position++;
        if (!this.tokens[this.position] || this.tokens[this.position].type !== 'LPAREN') throw new Error(`函数 ${functionToken.value} 后面必须跟括号`);
        this.position++;
        const argument = this.parseExpression();
        if (!this.tokens[this.position] || this.tokens[this.position].type !== 'RPAREN') throw new Error('函数调用缺少右括号');
        this.position++;
        return { type: 'FUNCTION_CALL', name: functionToken.value, argument };
    }
    parseAbsolute() {
        this.position++;
        const expr = this.parseExpression();
        if (!this.tokens[this.position] || this.tokens[this.position].type !== 'ABS') throw new Error('绝对值缺少右边的 |');
        this.position++;
        return { type: 'FUNCTION_CALL', name: 'abs', argument: expr };
    }
    evaluate(node, x) {
        switch (node.type) {
            case 'NUMBER': return node.value;
            case 'VARIABLE': return node.name === 'x' ? x : (() => { throw new Error(`未知变量: ${node.name}`) })();
            case 'BINARY_OP': {
                const left = this.evaluate(node.left, x);
                const right = this.evaluate(node.right, x);
                switch (node.operator) {
                    case '+': return left + right;
                    case '-': return left - right;
                    case '*': return left * right;
                    case '/': return Math.abs(right) < 1e-10 ? (right > 0 ? Infinity : -Infinity) : left / right;
                    case '^': return Math.pow(left, right);
                    default: throw new Error(`未知运算符: ${node.operator}`);
                }
            }
            case 'UNARY_OP': {
                const operand = this.evaluate(node.operand, x);
                return node.operator === '+' ? operand : -operand;
            }
            case 'FUNCTION_CALL': {
                const arg = this.evaluate(node.argument, x);
                return this.callFunction(node.name, arg);
            }
            default: throw new Error(`未知节点类型: ${node.type}`);
        }
    }
    callFunction(name, arg) {
        switch (name) {
            case 'abs': return Math.abs(arg);
            case 'sqrt': return arg < 0 ? NaN : Math.sqrt(arg);
            case 'sin': return Math.sin(arg);
            case 'cos': return Math.cos(arg);
            case 'tan': return Math.tan(arg);
            case 'log': return arg <= 0 ? NaN : Math.log10(arg);
            case 'ln': return arg <= 0 ? NaN : Math.log(arg);
            default: throw new Error(`未知函数: ${name}`);
        }
    }
    static validate(expression) {
        try {
            const parser = new MathParser();
            const func = parser.parse(expression);
            func(0); func(1); func(-1);
            return { valid: true, message: '表达式有效' };
        } catch (error) {
            return { valid: false, message: error.message };
        }
    }
    static preprocessExpression(expression) {
        return expression
            .replace(/(\d)([a-zA-Z])/g, '$1*$2')
            .replace(/\)([a-zA-Z])/g, ')*$1')
            .replace(/(\d)\(/g, '$1*(')
            .replace(/\)(\d)/g, ')*$1');
    }
}

function testExpression(expr) {
    const output = document.getElementById('output');
    output.innerHTML = '';
    
    try {
        const parser = new MathParser();
        const preprocessed = MathParser.preprocessExpression(expr);
        const func = parser.parse(preprocessed);
        
        const results = [];
        for (let x = -5; x <= 5; x += 1) {
            const y = func(x);
            results.push(`x=${x} → y=${y}`);
        }
        
        const resultDiv = document.getElementById(`result${['-x^2', 'x^2', '-2*x + 3', '-x^2 + 4*x - 3'].indexOf(expr) + 1}`);
        resultDiv.className = 'result success';
        resultDiv.innerHTML = `<strong>✓ 解析成功！</strong><br/>测试值: ${results.join('<br/>')}`;
        
        output.innerHTML = `表达式: ${expr}\n预处理后: ${preprocessed}\n\n测试结果:\n${results.join('\n')}`;
        
    } catch (error) {
        const resultDiv = document.getElementById(`result${['-x^2', 'x^2', '-2*x + 3', '-x^2 + 4*x - 3'].indexOf(expr) + 1}`);
        resultDiv.className = 'result error';
        resultDiv.innerHTML = `<strong>✗ 解析失败：</strong>${error.message}`;
        
        output.innerHTML = `表达式: ${expr}\n错误: ${error.message}`;
    }
}
    </script>
</body>
</html>
